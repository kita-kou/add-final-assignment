<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Coin Click Game</title>
<link rel="stylesheet" href="../CSS/style.css">
</head>
<body>

<div id="score">Score: 0</div>
<div id="result"></div>

<div id="controls">
    <select id="timeSelect">
        <option value="10">10秒</option>
        <option value="20">20秒</option>
        <option value="30">30秒</option>
    </select>
    <button id="startBtn">開始</button>
</div>

<div id="gameArea"></div>

<button id="retryBtn">リトライ</button>

<!-- 効果音 -->
<audio id="soundCoin" src="coin.mp3"></audio>
<audio id="soundFake" src="fake.mp3"></audio>
<audio id="soundEnd" src="end.mp3"></audio>

<script src="../JS/game.js"></script>
</body>
</html>
